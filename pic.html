  <script>
    function openFullImage(imageSrc) {
      const modal = document.getElementById("imageModal");
      const fullImg = document.getElementById("fullImage");

      fullImg.src = imageSrc; // Set the source of the big image
      modal.classList.remove("hidden"); // Show the modal
      document.body.style.overflow = "hidden"; // Prevent scrolling while viewing
    }

    function closeFullImage() {
      const modal = document.getElementById("imageModal");
      modal.classList.add("hidden"); // Hide the modal
      document.body.style.overflow = "auto"; // Re-enable scrolling
    }

    // Optional: Close when clicking anywhere outside the image
    document
      .getElementById("imageModal")
      .addEventListener("click", function (e) {
        if (e.target === this) closeFullImage();
      });
  </script>
